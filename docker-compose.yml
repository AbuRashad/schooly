services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: schooly-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - CAMERAS_CONFIG_PATH=/app/cameras.json
    volumes:
      - ./cameras.json:/app/cameras.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: schooly-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
