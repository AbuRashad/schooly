services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: schooly-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    volumes:
      - ./local:/local:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: schooly-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - CAMERAS_CONFIG_PATH=/app/cameras.json
    volumes:
      - ./cameras.json:/app/cameras.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: schooly-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Direct API access without nginx (for testing)
