name: Build & Deploy School Smart Eye

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build frontend
        run: npm run build

      - name: Build server
        run: npm run build:server

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: dist-server/

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t schooly-api:latest .

      - name: Build Frontend Docker image
        run: docker build -f Dockerfile.frontend -t schooly-frontend:latest .

      - name: Test API health
        run: |
          docker run -d --name api -p 3000:3000 schooly-api:latest
          sleep 5
          curl -f http://localhost:3000/api/health || exit 1
          docker stop api
