query ListAllCourses @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it lists general course information.") {
  courses {
    id
    title
    description
    category
    price
    difficultyLevel
    instructor {
      displayName
    }
  }
}

query GetMyEnrollments @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as it fetches their own enrollments.") {
  enrollments(where: {userId: {eq_expr: "auth.uid"}}) {
    course {
      title
      instructor {
        displayName
      }
    }
    enrolledAt
    progress
    completedAt
  }
}

mutation CreateNewLesson($courseId: UUID!, $title: String!, $order: Int!, $lessonType: String!, $contentUrl: String, $description: String) @auth(expr: "auth.uid != null && exists(query.course(id: $courseId, where: {instructorId: {eq_expr: \"auth.uid\"}}).id)", insecureReason: "This operation is protected to ensure only the instructor of a course can add a lesson to it.") {
  lesson_insert(data: {
    courseId: $courseId,
    title: $title,
    order: $order,
    lessonType: $lessonType,
    contentUrl: $contentUrl,
    description: $description
  })
}

mutation SubmitCourseReview($courseId: UUID!, $rating: Int!, $comment: String) @auth(level: USER, insecureReason: "This operation allows logged-in users to submit reviews for courses they have enrolled in, ensuring 'auth.uid' is used implicitly for the user.") {
  review_insert(data: {
    userId_expr: "auth.uid",
    courseId: $courseId,
    rating: $rating,
    comment: $comment
  })
}