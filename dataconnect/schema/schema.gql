type User @table {
  displayName: String!
  email: String!
  createdAt: Timestamp!
  photoUrl: String
  bio: String
}

type Course @table {
  instructor: User!
  title: String!
  description: String!
  category: String!
  price: Float!
  createdAt: Timestamp!
  imageUrl: String
  difficultyLevel: String
}

type Enrollment @table(key: ["user", "course"]) {
  user: User!
  course: Course!
  enrolledAt: Timestamp!
  progress: Int!
  completedAt: Timestamp
}

type Lesson @table {
  course: Course!
  title: String!
  order: Int!
  lessonType: String!
  contentUrl: String
  description: String
}

type Assignment @table {
  course: Course!
  lesson: Lesson
  title: String!
  dueDate: Timestamp!
  createdAt: Timestamp!
  description: String
  maxScore: Int
}

type Review @table(key: ["user", "course"]) {
  user: User!
  course: Course!
  rating: Int!
  createdAt: Timestamp!
  comment: String
}